# --- 接続設定 ---
CONFIG_ZMK_BLE=y
CONFIG_ZMK_USB=y

# --- ハードウェア互換性設定 ---
# nRF52840のNFCピン（P0.09, P0.10）を通常のGPIOとして解放する
# nice!nano v2で全てのピンを自由に使うために必須です
CONFIG_NFCT_PINS_AS_GPIOS=y

# --- マウス操作 (Pointing) ---
# キーマップでマウス移動やクリックを使いたい場合に必要
CONFIG_ZMK_POINTING=y

# --- 電源・バッテリー ---
# バッテリー残量を接続先に報告する
CONFIG_ZMK_BATTERY_REPORTING=y
# バッテリーレポートの更新間隔（秒）を増やすと節電になります（任意）
CONFIG_ZMK_BATTERY_REPORTING_INTERVAL=600
# 親機が子機の電池残量を「代理（Proxy）」でPCに報告するようにします。
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y
# 親機が子機から定期的に電池残量データを取得（Fetching）しにいくようにします。
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y
